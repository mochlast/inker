name: Build sleep-schedule image to GHCR

# Runs backend unit tests, then builds the all-in-one Inker image natively on an
# x86_64 runner (no emulation) and pushes it to GHCR under the :sleep-schedule
# tag, for testing the night-sleep feature on a Synology NAS / amd64 host.

on:
  push:
    branches:
      - 'feature/device-sleep-schedule'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/inker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Backend unit tests
        run: cd backend && bun install --frozen-lockfile && bun test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:sleep-schedule
          cache-from: type=gha
          cache-to: type=gha,mode=max
