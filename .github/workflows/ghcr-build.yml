name: Build image to GHCR (fix build)

# Builds the all-in-one Inker image natively on an x86_64 runner (no emulation)
# and pushes it to the GitHub Container Registry, so it can be pulled on a
# Synology NAS or any amd64 Docker host.

on:
  push:
    branches:
      - 'fix/issue-23-weather-icons'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/inker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:issue23-weather-fix
          cache-from: type=gha
          cache-to: type=gha,mode=max
